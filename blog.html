<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Education Blog | CreditGen 10X</title>
    <meta name="description" content="Free credit education articles on building credit, reading credit reports, disputing errors, and protecting your identity.">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="theme-color" content="#1e3a8a">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f8fafc; color: #1a1a1a; }

        header {
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
            color: white; padding: 40px 0; text-align: center;
        }
        .logo { font-size: 1.5rem; font-weight: 800; margin-bottom: 8px; }
        .logo a { color: white; text-decoration: none; }
        header h1 { font-size: 2rem; font-weight: 800; margin-bottom: 10px; }
        header p { opacity: 0.9; font-size: 1.05rem; }

        .container { max-width: 900px; margin: 0 auto; padding: 0 20px; }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            padding: 50px 0;
        }

        .post-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
        }
        .post-card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.1); }

        .post-card-img { width: 100%; height: 180px; object-fit: cover; background: #e5e7eb; }
        .post-card-img-placeholder { width: 100%; height: 180px; background: linear-gradient(135deg, #1e3a8a, #3b82f6); display: flex; align-items: center; justify-content: center; font-size: 3rem; }

        .post-card-body { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .post-card-tag { font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: #3b82f6; margin-bottom: 8px; }
        .post-card-title { font-size: 1.05rem; font-weight: 700; color: #1e3a8a; line-height: 1.4; margin-bottom: 10px; }
        .post-card-excerpt { font-size: 0.88rem; color: #6b7280; line-height: 1.6; flex: 1; }
        .post-card-meta { margin-top: 14px; font-size: 0.8rem; color: #9ca3af; display: flex; gap: 12px; }
        .post-card-read { margin-top: 14px; color: #3b82f6; font-size: 0.85rem; font-weight: 600; }

        .back-link { display: inline-block; margin: 30px 0 0; color: #3b82f6; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        .back-link:hover { text-decoration: underline; }

        footer { background: #0f172a; color: #94a3b8; padding: 30px 0; text-align: center; font-size: 0.85rem; margin-top: 60px; }
        footer a { color: #60a5fa; text-decoration: none; }

        .no-posts { text-align: center; padding: 80px 20px; color: #6b7280; }

        @media (max-width: 640px) { .blog-grid { grid-template-columns: 1fr; } header h1 { font-size: 1.5rem; } }
    </style>
</head>
<body>

<header>
    <div class="container">
        <div class="logo"><a href="/">CreditGen 10X</a></div>
        <h1>📚 Credit Education Blog</h1>
        <p>Free guides on credit reports, credit repair, and identity protection</p>
    </div>
</header>

<div class="container">
    <a href="/" class="back-link">← Back to main site</a>
    <div class="blog-grid" id="blog-grid">
        <div class="no-posts">Loading posts...</div>
    </div>
</div>

<footer>
    <div class="container">
        <p>&copy; <span id="year"></span> CreditGen 10X. All rights reserved. | <a href="/">Home</a></p>
        <p style="margin-top:8px;font-size:0.78rem;opacity:0.6;">Content is for educational purposes only and does not constitute legal or financial advice.</p>
    </div>
</footer>

<script src="https://unpkg.com/marked@9.1.6/marked.min.js"></script>
<script src="https://unpkg.com/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
<script>
document.getElementById('year').textContent = new Date().getFullYear();

const CATEGORY_EMOJIS = {
    'credit-building': '📈',
    'credit-reports': '📄',
    'credit-repair': '🔧',
    'identity-protection': '🛡️',
    'debt-collections': '💳',
    'free-resources': '🎁'
};

const CATEGORY_LABELS = {
    'credit-building': 'Credit Building',
    'credit-reports': 'Credit Reports',
    'credit-repair': 'Credit Repair',
    'identity-protection': 'Identity Protection',
    'debt-collections': 'Debt & Collections',
    'free-resources': 'Free Resources'
};

// This index is auto-generated by build process or manually maintained
// Format: array of { slug, title, description, date, category, thumbnail }
async function loadPosts() {
    try {
        const res = await fetch('/posts/index.json');
        if (!res.ok) throw new Error('No index');
        return await res.json();
    } catch {
        return [];
    }
}

async function renderBlog() {
    const grid = document.getElementById('blog-grid');
    const posts = await loadPosts();

    if (!posts.length) {
        grid.innerHTML = `
            <div class="no-posts" style="grid-column:1/-1">
                <p style="font-size:2rem;margin-bottom:16px;">✍️</p>
                <p style="font-size:1.1rem;font-weight:600;color:#374151;margin-bottom:8px;">No posts yet</p>
                <p>Articles published through Decap CMS will appear here automatically.</p>
            </div>`;
        return;
    }

    // Sort by date descending
    posts.sort((a, b) => new Date(b.date) - new Date(a.date));

    grid.innerHTML = posts.map(post => {
        const emoji = CATEGORY_EMOJIS[post.category] || '📝';
        const label = CATEGORY_LABELS[post.category] || post.category;
        const date = post.date ? new Date(post.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' }) : '';

        const imgHtml = post.thumbnail
            ? `<img src="${post.thumbnail}" alt="${post.thumbnail_alt || post.title}" class="post-card-img" loading="lazy">`
            : `<div class="post-card-img-placeholder">${emoji}</div>`;

        return `
            <a href="/blog/${post.slug}" class="post-card">
                ${imgHtml}
                <div class="post-card-body">
                    <p class="post-card-tag">${label}</p>
                    <p class="post-card-title">${post.title}</p>
                    <p class="post-card-excerpt">${post.description}</p>
                    <div class="post-card-meta">
                        <span>${date}</span>
                        ${post.read_time ? `<span>· ${post.read_time} min read</span>` : ''}
                    </div>
                    <span class="post-card-read">Read article →</span>
                </div>
            </a>`;
    }).join('');
}

renderBlog();
</script>
</body>
</html>
